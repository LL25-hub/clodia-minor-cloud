<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test di Integrazione React</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-900">Sistema di Prenotazione - Test</h1>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow p-6">
      <h2 class="text-xl font-semibold mb-6">Test dei Componenti React</h2>
      
      <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
        <!-- Calendario -->
        <div class="bg-white rounded-lg shadow border p-4">
          <h3 class="text-lg font-semibold mb-4">Calendario Prenotazioni</h3>
          <div id="react-calendar-container" class="min-h-64 border rounded p-4 bg-gray-100">
            <!-- Il componente React verrà montato qui -->
            <p class="text-gray-600">Il componente React del calendario dovrebbe apparire qui.</p>
          </div>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-lg shadow border p-4">
          <h3 class="text-lg font-semibold mb-4">Form di Prenotazione</h3>
          <div id="react-form-container" class="min-h-64 border rounded p-4 bg-gray-100">
            <!-- Il componente React verrà montato qui -->
            <p class="text-gray-600">Il componente React del form dovrebbe apparire qui.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white shadow mt-8 py-4">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <p class="text-center text-gray-500 text-sm">
        Sistema di Prenotazione React - Test © 2023
      </p>
    </div>
  </footer>

  <!-- Script di integrazione React -->
  <script>
    // Dati mock
    window.roomsList = [
      { id: 1, room_number: 'A101', floor: 'Piano Terra' },
      { id: 2, room_number: 'A102', floor: 'Piano Terra' },
      { id: 3, room_number: 'B201', floor: 'Primo Piano' },
      { id: 4, room_number: 'B202', floor: 'Primo Piano' }
    ];

    window.reservationInitialData = {
      client_name: 'Cliente Test',
      client_phone: '333-1234567',
      room_id: 2,
      check_in_date: '2023-08-15',
      check_out_date: '2023-08-20',
      num_people: 2,
      has_beach: true,
      has_deposit: true,
      notes: 'Nota di test',
      reference: 'Booking',
      reservation_color: 'yellow',
      estimate_amount: 500,
      cash_amount: 200,
      transfer_amount: 0
    };

    // Funzioni mock
    window.editReservation = function(id) {
      console.log(`Modifica prenotazione ${id} richiesta`);
      alert(`Modifica prenotazione ${id} richiesta`);
    };

    window.onReservationSaved = function() {
      console.log('Prenotazione salvata');
      alert('Prenotazione salvata con successo!');
    };

    window.onReservationCancelled = function() {
      console.log('Prenotazione annullata');
      alert('Prenotazione annullata');
    };
  </script>

  <!-- Simulazione dei componenti React -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Simula il caricamento del calendario
      const calendarContainer = document.getElementById('react-calendar-container');
      if (calendarContainer) {
        calendarContainer.innerHTML = `
          <div class="bg-blue-50 p-4 rounded">
            <h4 class="text-blue-800 font-medium mb-2">Calendario React (simulato)</h4>
            <div class="grid grid-cols-7 gap-1 text-center mb-2">
              <div class="text-xs font-bold">Lun</div>
              <div class="text-xs font-bold">Mar</div>
              <div class="text-xs font-bold">Mer</div>
              <div class="text-xs font-bold">Gio</div>
              <div class="text-xs font-bold">Ven</div>
              <div class="text-xs font-bold bg-yellow-100">Sab</div>
              <div class="text-xs font-bold bg-gray-200">Dom</div>
              ${Array(30).fill(0).map((_, i) => 
                `<div class="h-8 border bg-white rounded hover:bg-blue-100 cursor-pointer flex items-center justify-center text-sm">
                  ${i + 1}
                </div>`
              ).join('')}
            </div>
            <div class="border p-2 rounded bg-gradient-to-r from-amber-400 to-yellow-500 text-center mb-2">
              Prenotazione Demo
            </div>
            <p class="text-xs text-blue-800">Componente React caricato con successo</p>
          </div>
        `;
      }

      // Simula il caricamento del form
      const formContainer = document.getElementById('react-form-container');
      if (formContainer) {
        formContainer.innerHTML = `
          <div class="bg-blue-50 p-4 rounded">
            <h4 class="text-blue-800 font-medium mb-2">Form di Prenotazione React (simulato)</h4>
            <div class="grid grid-cols-2 gap-2 mb-2">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nome Cliente</label>
                <input type="text" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm" value="Cliente Test" readonly>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Telefono</label>
                <input type="text" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm" value="333-1234567" readonly>
              </div>
            </div>
            <div class="flex mt-4 justify-between">
              <button class="bg-gray-200 text-gray-800 hover:bg-gray-300 px-4 py-2 rounded-md text-sm font-medium">Annulla</button>
              <button class="bg-blue-600 text-white hover:bg-blue-700 px-4 py-2 rounded-md text-sm font-medium">Salva</button>
            </div>
            <p class="text-xs text-blue-800 mt-2">Componente React caricato con successo</p>
          </div>
        `;
      }
    });
  </script>
</body>
</html>
